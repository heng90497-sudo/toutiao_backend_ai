version: '3.8'

services:
  # 1. 缓存服务：Redis
  redis:
    image: redis:7.0-alpine  # alpine 是体积最小的版本，非常轻量
    container_name: toutiao-redis
    ports:
      - "6379:6379"          # 左边是暴露给你的电脑的端口，右边是容器内的端口
    command: redis-server --requirepass "123456" # 给 Redis 设置个密码，模拟真实环境
    volumes:
      - redis_data:/data     # 数据持久化，重启容器数据不丢
    restart: always

  # 2. 消息队列服务：RabbitMQ
  rabbitmq:
    image: rabbitmq:3.12-management # management 带有超好用的可视化网页后台
    container_name: toutiao-rabbitmq
    ports:
      - "5672:5672"          # 代码通信用的端口
      - "15672:15672"        # 网页后台访问用的端口
    environment:
      RABBITMQ_DEFAULT_USER: "admin"   # 自定义账号
      RABBITMQ_DEFAULT_PASS: "admin123" # 自定义密码
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: always

# 声明持久化数据卷
volumes:
  redis_data:
  rabbitmq_data: