name: FastAPI 自动化测试流水线 (CI)

# 触发条件：当你向 main 或 master 分支 push 代码时触发
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    name: 运行 Pytest 接口自动化测试
    runs-on: ubuntu-latest  # GitHub 免费提供的一台 Ubuntu 服务器

    # 【测开核心技术】：在这个任务里临时拉起一个 MySQL 数据库供测试使用！
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 123456
          MYSQL_DATABASE: toutiao_test  # 自动建好测试库
        ports:
          - 3306:3306
        # 健康检查：等 MySQL 完全启动好之后，才开始跑后面的 Python 测试
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
    # 步骤 1：把你的代码从仓库拉取到这台服务器上
    - name: 📥 检出代码
      uses: actions/checkout@v3

    # 步骤 2：安装 Python 3.10 环境
    - name: 🐍 设置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        cache: 'pip' # 利用缓存加速包安装

    # 步骤 3：安装你项目的依赖包
    - name: 📦 安装依赖包
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # 确保安装了测试专属的包
        pip install pytest pytest-asyncio httpx faker cryptography pymysql

    # 步骤 4：运行终极测试！
    - name: 🧪 执行 Pytest 自动化测试
      env:
        # 如果代码里读了环境变量，这里可以传。由于我们代码里写死了 127.0.0.1，刚好能连上上面的 mysql service
        TEST_ENV: "github_actions"
      run: |
        pytest test/ -v